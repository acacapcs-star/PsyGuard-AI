name: psyguard_ai_app
description: "Lumi - 你的心靈守護精靈"
publish_to: 'none'
version: 1.0.0+14

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.0
  drift: ^2.28.2
  drift_flutter: ^0.2.5
  sqlite3_flutter_libs: ^0.5.39
  dio: ^5.9.0
  flutter_dotenv: ^5.2.1
  fl_chart: ^1.1.1
  permission_handler: ^12.0.1
  flutter_secure_storage: ^9.2.4
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.3
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  uuid: ^4.5.1
  image: ^4.5.4
  google_fonts: ^8.0.1
  flutter_markdown: ^0.7.7+1
  flutter_svg: ^2.3.0
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.5.4
  drift_dev: ^2.28.2
  flutter_launcher_icons: ^0.14.1

dependency_overrides:
  path_provider_foundation: 2.5.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#FFFFFF"
    theme_color: "#F6B48A"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/icon.png"
  image_path: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/lii_logo.svg
    - assets/images/
    - .env
    - .env.example
